<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
  </head>
  <body>
    <div id="app">
      <canvas id="board"></canvas>
      <div id="sidebar">
        <div id="hold-piece">
          <h3>Hold</h3>
          <canvas id="hold-canvas"></canvas>
        </div>
        <div id="next-piece">
          <h3>Suivante</h3>
          <canvas id="preview"></canvas>
        </div>
        <div id="score-panel">
          <div>Score : <span id="score">0</span></div>
          <div>Meilleur : <span id="high-score">0</span></div>
          <div>Niveau : <span id="level">1</span></div>
          <div>Lignes : <span id="lines">0</span></div>
        </div>
        <div id="theme-label">
          <span id="theme-name">Néon</span>
        </div>
        <div id="ai-controls">
          <button id="ai-toggle">Mode : Manuel</button>
          <div id="ai-speed-control">
            <label for="ai-speed">Vitesse AI : <span id="ai-speed-label">80ms</span></label>
            <input type="range" id="ai-speed" min="20" max="300" value="80" step="10" />
          </div>
        </div>
        <button id="mute-toggle">Son : On</button>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
