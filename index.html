<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tetris</title>
  </head>
  <body>
    <div id="mode-switch" role="tablist" aria-label="Mode de jeu">
      <button id="mode-solo" class="mode-btn" role="tab" aria-selected="false">Solo</button>
      <button id="mode-versus" class="mode-btn active" role="tab" aria-selected="true">Versus AI</button>
    </div>

    <div id="app" style="display:none">
      <canvas id="board" role="img" aria-label="Grille de jeu Tetris — en attente"></canvas>
      <div id="sidebar" role="complementary" aria-label="Informations de jeu">
        <div id="hold-piece">
          <h3>Hold</h3>
          <canvas id="hold-canvas" role="img" aria-label="Pièce en réserve"></canvas>
        </div>
        <div id="next-piece">
          <h3>Suivantes</h3>
          <canvas id="preview" role="img" aria-label="Prochaine pièce"></canvas>
          <canvas id="queue-1" class="queue-canvas" role="img" aria-label="Pièce suivante 2"></canvas>
          <canvas id="queue-2" class="queue-canvas" role="img" aria-label="Pièce suivante 3"></canvas>
        </div>
        <div id="score-panel">
          <div>Score : <span id="score">0</span></div>
          <div>Meilleur : <span id="high-score">0</span></div>
          <div>Niveau : <span id="level">1</span></div>
          <div>Lignes : <span id="lines">0</span></div>
          <div id="combo-display" style="display:none">Combo : <span id="combo">0</span></div>
        </div>
        <div id="theme-label" aria-live="polite">
          <span id="theme-name">Néon</span>
          <div id="theme-progress"><div id="theme-progress-bar"></div></div>
        </div>
        <div id="ai-controls">
          <button id="ai-toggle" aria-pressed="true">Mode : AI</button>
          <div id="ai-speed-control">
            <label for="ai-speed">Vitesse AI : <span id="ai-speed-label">700ms</span></label>
            <input type="range" id="ai-speed" min="20" max="1000" value="700" step="10" aria-label="Vitesse AI en millisecondes" />
            <div id="ai-speed-bar" aria-hidden="true"></div>
          </div>
        </div>
        <button id="mute-toggle" aria-pressed="false">Son : On</button>
        <div id="das-controls">
          <label for="das-delay">DAS délai : <span id="das-delay-label">170ms</span></label>
          <input type="range" id="das-delay" min="50" max="500" value="170" step="10" aria-label="Délai DAS en millisecondes" />
          <label for="das-repeat">DAS répétition : <span id="das-repeat-label">50ms</span></label>
          <input type="range" id="das-repeat" min="16" max="200" value="50" step="2" aria-label="Répétition DAS en millisecondes" />
        </div>
      </div>
    </div>

    <canvas id="vs-ambient" aria-hidden="true" style="display:none"></canvas>

    <div id="vs-commentator" aria-live="polite" aria-atomic="true" style="display:none">
      <div class="vs-comm-main"></div>
    </div>

    <div id="versus-app" aria-hidden="false">
      <button id="vs-start-overlay" class="vs-start-overlay" type="button">
        <span class="vs-start-overlay-label">
          <span>S</span><span>T</span><span>A</span><span>R</span><span>T</span>
        </span>
        <span class="vs-start-overlay-hint">AI VS AI</span>
      </button>
      <div class="vs-side vs-side-left">
        <div class="vs-player-tag">AI 1</div>
        <div class="vs-lead-counter" id="vs-lead-p1" aria-hidden="true">
          <span class="vs-lead-num" data-num="0">0</span><span class="vs-lead-unit">s</span>
        </div>
        <canvas id="board-left" class="vs-board" role="img" aria-label="Grille Tetris IA 1"></canvas>
        <div class="vs-next-wrap">
          <span class="vs-next-label">NEXT</span>
          <canvas id="preview-left" class="vs-next" role="img" aria-label="Prochaine pièce IA 1"></canvas>
        </div>
      </div>
      <div class="vs-center">
        <canvas id="vs-gauge" role="img" aria-label="Jauge de score versus"></canvas>
      </div>
      <div class="vs-side vs-side-right">
        <div class="vs-player-tag">AI 2</div>
        <div class="vs-lead-counter" id="vs-lead-p2" aria-hidden="true">
          <span class="vs-lead-num" data-num="0">0</span><span class="vs-lead-unit">s</span>
        </div>
        <canvas id="board-right" class="vs-board" role="img" aria-label="Grille Tetris IA 2"></canvas>
        <div class="vs-next-wrap">
          <span class="vs-next-label">NEXT</span>
          <canvas id="preview-right" class="vs-next" role="img" aria-label="Prochaine pièce IA 2"></canvas>
        </div>
      </div>
    </div>

    <div id="versus-controls" aria-hidden="false">
      <button id="vs-start" class="vs-btn">▶ START</button>
      <button id="vs-reset" class="vs-btn">⟲ NEW MATCH</button>
      <label class="vs-speed-label">AI <input type="range" id="vs-speed" min="20" max="300" value="80" step="10"> <span id="vs-speed-label">80ms</span></label>
      <button id="vs-ambient-next" class="vs-btn vs-btn-small" aria-label="Prochaine animation d'arrière-plan">⟳ <span id="vs-ambient-label">Starfield</span></button>
    </div>

    <div id="game-announcer" class="sr-only" aria-live="assertive" aria-atomic="true"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
